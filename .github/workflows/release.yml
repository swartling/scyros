name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: myapp
            asset_name: myapp-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: myapp
            asset_name: myapp-aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: myapp
            asset_name: myapp-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: myapp
            asset_name: myapp-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: myapp.exe
            asset_name: myapp-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.bin }}
          tar -czf dist/${{ matrix.asset_name }}.tar.gz -C dist ${{ matrix.bin }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          Compress-Archive -Path "dist/${{ matrix.bin }}" -DestinationPath "dist/${{ matrix.asset_name }}.zip"

      - name: Upload release asset (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}.tar.gz

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}.zip